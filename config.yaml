app:
  debug: false
  name: Python Features Explorer
  version: 2.0.0
display:
  content_width: 80
  show_descriptions: true
  show_progress_bars: true
  wide_separators: true
execution:
  max_examples_per_session: 0
  shell: python3
  timeout_seconds: 30
favorites:
  enabled: true
  max_favorites: 10
logging:
  file: python_explorer.log
  level: INFO
  max_size_mb: 10
progress:
  auto_save: true
  enabled: true
  storage_file: user_progress.json
quizzes:
  enabled: true
  max_quiz_retries: -1
  passing_score: 70
  questions_per_quiz: 11
  retry_after_fail: true
  show_explanations: true
  show_explanations: true
search:
  fuzzy_match: true
  min_characters: 2
  search_scope: all
security:
  allowed_directories:
  - examples
  blocked_functions:
  - os.system
  - os.popen
  - eval
  - exec
  - subprocess.call
  - subprocess.run
  sandbox_mode: false
theme:
  colors:
    chapter_title: green
    error: red
    example: blue
    header: cyan
    highlight: magenta
    output: white
    success: green
    warning: yellow
  mode: auto
